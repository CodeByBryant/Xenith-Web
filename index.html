    <!-- Blocking theme init — prevents flash and fixes system-dark-but-stored-light mismatch -->
    <script>
      (function(){
        try {
          var t = localStorage.getItem('xenith-theme');
          var dark = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.add(dark ? 'dark' : 'light');
        } catch(e){}
      })();
